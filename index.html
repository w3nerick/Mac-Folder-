<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carpetero — Editor de Iconos de Carpeta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@jaames/iro@5"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0f;
  --card: #14141f;
  --card-border: #1e1e3a;
  --accent1: #00d4ff;
  --accent2: #ff8800;
  --text: #e8e8f0;
  --text-secondary: #8888aa;
  --radius: 8px;
  --font: 'Inter', -apple-system, sans-serif;
  --mono: 'JetBrains Mono', monospace;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.5;
  overflow-x: hidden;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent1); }

/* Header */
.header {
  padding: 16px 24px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid var(--card-border);
  background: rgba(20,20,31,0.8);
  backdrop-filter: blur(12px);
  position: sticky;
  top: 0;
  z-index: 100;
}
.header h1 {
  font-size: 1.25rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent1), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.header .subtitle {
  font-size: 0.75rem;
  color: var(--text-secondary);
  font-family: var(--mono);
}

/* Main Layout */
.main {
  display: grid;
  grid-template-columns: 380px 1fr;
  gap: 24px;
  padding: 24px;
  max-width: 1400px;
  margin: 0 auto;
}

@media (max-width: 900px) {
  .main {
    grid-template-columns: 1fr;
    padding: 16px;
  }
}

/* Cards */
.card {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  padding: 16px;
  backdrop-filter: blur(8px);
}
.card + .card { margin-top: 16px; }
.card-title {
  font-family: var(--mono);
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--accent1);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  border-radius: var(--radius);
  border: 1px solid var(--card-border);
  background: var(--card);
  color: var(--text);
  font-family: var(--font);
  font-size: 0.8rem;
  cursor: pointer;
  transition: all 0.2s;
}
.btn:hover {
  border-color: var(--accent1);
  box-shadow: 0 0 12px rgba(0,212,255,0.15);
}
.btn-primary {
  background: linear-gradient(135deg, var(--accent1), #0099cc);
  border-color: var(--accent1);
  color: #000;
  font-weight: 600;
}
.btn-primary:hover {
  box-shadow: 0 0 20px rgba(0,212,255,0.4);
}
.btn-amber {
  background: linear-gradient(135deg, var(--accent2), #cc6600);
  border-color: var(--accent2);
  color: #000;
  font-weight: 600;
}
.btn-amber:hover {
  box-shadow: 0 0 20px rgba(255,136,0,0.4);
}
.btn-sm { padding: 5px 10px; font-size: 0.7rem; }

/* Toggle */
.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.toggle {
  width: 36px;
  height: 20px;
  background: #2a2a4a;
  border-radius: 10px;
  position: relative;
  cursor: pointer;
  transition: background 0.2s;
}
.toggle.active { background: var(--accent1); }
.toggle::after {
  content: '';
  position: absolute;
  top: 2px;
  left: 2px;
  width: 16px;
  height: 16px;
  background: #fff;
  border-radius: 50%;
  transition: transform 0.2s;
}
.toggle.active::after { transform: translateX(16px); }

/* Input */
.input {
  width: 100%;
  padding: 8px 12px;
  border-radius: var(--radius);
  border: 1px solid var(--card-border);
  background: #0d0d18;
  color: var(--text);
  font-family: var(--font);
  font-size: 0.85rem;
  transition: border-color 0.2s;
}
.input:focus {
  outline: none;
  border-color: var(--accent1);
  box-shadow: 0 0 8px rgba(0,212,255,0.1);
}

/* Tabs */
.tabs {
  display: flex;
  gap: 2px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.tab {
  padding: 5px 10px;
  font-size: 0.7rem;
  border-radius: 4px;
  cursor: pointer;
  color: var(--text-secondary);
  transition: all 0.2s;
  border: 1px solid transparent;
  font-family: var(--mono);
}
.tab:hover { color: var(--text); background: rgba(0,212,255,0.05); }
.tab.active {
  color: var(--accent1);
  background: rgba(0,212,255,0.1);
  border-color: rgba(0,212,255,0.3);
}

/* Symbol Grid */
.symbol-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(36px, 1fr));
  gap: 4px;
  max-height: 200px;
  overflow-y: auto;
  padding: 4px;
}
.symbol-item {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.15s;
  border: 1px solid transparent;
}
.symbol-item:hover {
  background: rgba(0,212,255,0.1);
  border-color: var(--accent1);
}
.symbol-item svg {
  width: 20px;
  height: 20px;
  stroke: var(--text);
  fill: none;
  stroke-width: 2;
}
.symbol-item.brand svg {
  fill: var(--text);
  stroke: none;
}

/* Color picker area */
.color-picker-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}
.color-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
}

/* Preview */
.preview-section {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.preview-container {
  position: relative;
  width: 100%;
  aspect-ratio: 1;
  max-width: 512px;
  margin: 0 auto;
  background-image:
    linear-gradient(45deg, #1a1a2a 25%, transparent 25%),
    linear-gradient(-45deg, #1a1a2a 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, #1a1a2a 75%),
    linear-gradient(-45deg, transparent 75%, #1a1a2a 75%);
  background-size: 20px 20px;
  background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
  border-radius: var(--radius);
  border: 1px solid var(--card-border);
  overflow: hidden;
}
.preview-folder {
  width: 100%;
  height: 100%;
  position: relative;
}
.preview-folder svg {
  width: 100%;
  height: 100%;
}

/* Overlay */
.overlay-container {
  position: absolute;
  cursor: move;
  user-select: none;
  display: flex;
  align-items: center;
  justify-content: center;
}
.overlay-container.selected {
  outline: 2px dashed var(--accent1);
  outline-offset: 4px;
}
.overlay-controls {
  position: absolute;
  top: -30px;
  right: -4px;
  display: none;
  gap: 4px;
}
.overlay-container.selected .overlay-controls { display: flex; }
.overlay-ctrl-btn {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 10px;
  border: 1px solid var(--card-border);
}
.overlay-ctrl-btn.delete { background: #ff4444; color: #fff; }
.overlay-ctrl-btn.rotate { background: var(--accent1); color: #000; }
.resize-handle {
  position: absolute;
  bottom: -4px;
  right: -4px;
  width: 10px;
  height: 10px;
  background: var(--accent2);
  border-radius: 50%;
  cursor: nwse-resize;
  display: none;
}
.overlay-container.selected .resize-handle { display: block; }

/* Upload Zone */
.upload-zone {
  border: 2px dashed var(--card-border);
  border-radius: var(--radius);
  padding: 24px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--text-secondary);
  font-size: 0.8rem;
}
.upload-zone:hover, .upload-zone.dragover {
  border-color: var(--accent1);
  background: rgba(0,212,255,0.03);
  color: var(--text);
}

/* Export buttons */
.export-row {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

/* Text overlay style */
.text-overlay {
  font-family: var(--font);
  font-weight: 700;
  color: #fff;
  text-shadow: 0 2px 4px rgba(0,0,0,0.5);
  white-space: nowrap;
  pointer-events: none;
}

/* Category select */
.cat-select {
  width: 100%;
  padding: 6px 10px;
  border-radius: var(--radius);
  border: 1px solid var(--card-border);
  background: #0d0d18;
  color: var(--text);
  font-family: var(--mono);
  font-size: 0.7rem;
  margin-bottom: 8px;
}
.cat-select:focus { outline: none; border-color: var(--accent1); }

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  padding: 12px 20px;
  background: var(--card);
  border: 1px solid var(--accent1);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 0.8rem;
  z-index: 9999;
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.3s;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }

/* Text config */
.text-config {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.text-config .row {
  display: flex;
  gap: 8px;
  align-items: center;
}
.text-config label {
  font-family: var(--mono);
  font-size: 0.65rem;
  color: var(--text-secondary);
  min-width: 50px;
}
.range-input {
  flex: 1;
  accent-color: var(--accent1);
}

/* Overlay text style on folder */
.folder-text-overlay {
  position: absolute;
  font-weight: 700;
  text-align: center;
  pointer-events: none;
  text-shadow: 0 1px 3px rgba(0,0,0,0.7);
  word-break: break-word;
  max-width: 60%;
}
</style>
</head>

<div class="header">

    <path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/>
  </svg>
  <div>
    <h1>Carpetero</h1>
    <div class="subtitle">editor de iconos de carpeta</div>

</div>

<div class="main">
  <!-- LEFT: Controls -->
  <div class="controls-col">
    <!-- Folder Color -->
    <div class="card">
      <div class="card-title"><i data-lucide="palette" style="width:14px;height:14px;"></i> Color de Carpeta</div>
      <div class="color-picker-area">
        <div id="folderColorPicker"></div>
        <div class="color-actions">
          <button class="btn btn-sm" id="resetColorBtn">Restaurar Azul</button>
          <button class="btn btn-sm" id="eyedropperBtn"><i data-lucide="pipette" style="width:12px;height:12px;"></i> Cuentagotas</button>
        </div>
      </div>
    </div>

    <!-- Paper Color -->
    <div class="card">
      <div class="card-title"><i data-lucide="file-text" style="width:14px;height:14px;"></i> Papel Interior</div>
      <div class="toggle-row">
        <span style="font-size:0.8rem;">Mostrar papel</span>
        <div class="toggle active" id="paperToggle"></div>
      </div>
      <div id="paperColorPicker" class="color-picker-area"></div>
    </div>

    <!-- Text Overlay -->
    <div class="card">
      <div class="card-title"><i data-lucide="type" style="width:14px;height:14px;"></i> Texto</div>
      <div class="text-config">
        <input type="text" class="input" id="textInput" placeholder="Escribe aqui..." maxlength="20">
        <div class="row">

        <div class="row">
          <label>Color</label>
          <input type="color" id="textColor" value="#ffffff" style="width:32px;height:24px;border:none;background:none;cursor:pointer;">
        </div>
      </div>
    </div>

    <!-- Symbols -->
    <div class="card">
      <div class="card-title"><i data-lucide="shapes" style="width:14px;height:14px;"></i> Simbolos</div>
      <div class="tabs" id="symbolTabs">
        <div class="tab active" data-tab="icons">Iconos</div>
        <div class="tab" data-tab="brands">Marcas</div>
      </div>
      <div id="iconsPanel">
        <select class="cat-select" id="categorySelect"></select>
        <div class="symbol-grid" id="symbolGrid"></div>
      </div>
      <div id="brandsPanel" style="display:none;">
        <div class="symbol-grid" id="brandGrid"></div>
      </div>
    </div>

    <!-- Image Upload -->
    <div class="card">
      <div class="card-title"><i data-lucide="image" style="width:14px;height:14px;"></i> Imagen</div>
      <div class="upload-zone" id="uploadZone">
        <i data-lucide="upload" style="width:24px;height:24px;margin-bottom:8px;display:block;margin:0 auto 8px;"></i>
        Arrastra una imagen, haz clic o pega con Cmd+V
        <input type="file" id="fileInput" accept="image/*" style="display:none;">
      </div>
    </div>
  </div>

  <!-- RIGHT: Preview + Export -->
  <div class="preview-section">
    <div class="card" style="flex:1;">
      <div class="card-title"><i data-lucide="eye" style="width:14px;height:14px;"></i> Vista Previa</div>
      <div class="preview-container" id="previewContainer">
        <div class="preview-folder" id="previewFolder"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title"><i data-lucide="download" style="width:14px;height:14px;"></i> Exportar</div>
      <div class="export-row">
        <button class="btn btn-primary" id="copyBtn"><i data-lucide="clipboard" style="width:14px;height:14px;"></i> Copiar al Portapapeles</button>
        <button class="btn btn-amber" id="downloadBtn"><i data-lucide="download" style="width:14px;height:14px;"></i> Descargar PNG</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

// ============================================================
// STATE
// ============================================================
let folderHue = 0; // degrees offset from default blue (200)
let folderSaturation = 100;
let paperColor = '#ffffff';
let showPaper = true;
let overlays = []; // {type:'text'|'symbol'|'brand'|'image', data, x, y, w, h, rotation, id}
let selectedOverlay = null;
let isDragging = false;
let isResizing = false;
let dragOffset = {x:0, y:0};
let textValue = '';
let textSize = 32;
let textColorVal = '#ffffff';

const DEFAULT_FOLDER_COLOR = '#5CBFEC';
const DEFAULT_HUE = 200;

// ============================================================
// INIT
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  lucide.createIcons();
  initColorPickers();
  initSymbols();
  initBrands();
  initUpload();
  initExport();
  initTextOverlay();
  initPreviewInteraction();
  renderPreview();
});

// ============================================================
// COLOR PICKERS (iro.js)
// ============================================================
function initColorPickers() {
  // Folder color picker
  const folderPicker = new iro.ColorPicker('#folderColorPicker', {
    width: 200,
    color: DEFAULT_FOLDER_COLOR,
    layout: [
      { component: iro.ui.Wheel, options: {} },
      { component: iro.ui.Slider, options: { sliderType: 'saturation' } },
      { component: iro.ui.Slider, options: { sliderType: 'value' } }
    ]
  });

  folderPicker.on('color:change', (color) => {
    const hsl = color.hsl;
    folderHue = hsl.h - DEFAULT_HUE;
    folderSaturation = hsl.s;
    renderPreview();
  });

  window.folderPicker = folderPicker;

  // Paper color picker
  const paperPicker = new iro.ColorPicker('#paperColorPicker', {
    width: 160,
    color: '#ffffff',
    layout: [
      { component: iro.ui.Wheel, options: {} },
      { component: iro.ui.Slider, options: { sliderType: 'value' } }
    ]
  });

  paperPicker.on('color:change', (color) => {
    paperColor = color.hexString;
    renderPreview();
  });

  window.paperPicker = paperPicker;

  // Reset button
  document.getElementById('resetColorBtn').addEventListener('click', () => {
    folderPicker.color.set(DEFAULT_FOLDER_COLOR);
    folderHue = 0;
    folderSaturation = 100;
    renderPreview();
  });

  // Eyedropper
  document.getElementById('eyedropperBtn').addEventListener('click', async () => {
    if (!window.EyeDropper) {
      showToast('El cuentagotas no esta soportado en este navegador');
      return;
    }
    try {
      const ed = new EyeDropper();
      const result = await ed.open();
      folderPicker.color.set(result.sRGBHex);
    } catch(e) {
      // user cancelled
    }
  });

  // Paper toggle
  document.getElementById('paperToggle').addEventListener('click', function() {
    this.classList.toggle('active');
    showPaper = this.classList.contains('active');
    renderPreview();
  });
}

// ============================================================
// TEXT OVERLAY
// ============================================================
function initTextOverlay() {
  const input = document.getElementById('textInput');
  const sizeSlider = document.getElementById('textSize');
  const sizeVal = document.getElementById('textSizeVal');
  const colorInput = document.getElementById('textColor');

  input.addEventListener('input', (e) => {
    textValue = e.target.value;
    renderPreview();
  });

  sizeSlider.addEventListener('input', (e) => {
    textSize = parseInt(e.target.value);
    sizeVal.textContent = textSize;
    renderPreview();
  });

  colorInput.addEventListener('input', (e) => {
    textColorVal = e.target.value;
    renderPreview();
  });
}

// ============================================================
// SYMBOLS
// ============================================================
function initSymbols() {
  const select = document.getElementById('categorySelect');
  const grid = document.getElementById('symbolGrid');

  // Populate categories
  Object.keys(ICON_CATEGORIES).forEach(cat => {
    const opt = document.createElement('option');
    opt.value = cat;
    opt.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
    select.appendChild(opt);
  });

  function renderCategory(cat) {
    grid.innerHTML = '';
    const icons = ICON_CATEGORIES[cat] || [];
    icons.forEach(iconName => {
      const item = document.createElement('div');
      item.className = 'symbol-item';
      item.innerHTML = `<i data-lucide="${iconName}"></i>`;
      item.title = iconName;
      item.addEventListener('click', () => addSymbolOverlay(iconName));
      grid.appendChild(item);
    });
    lucide.createIcons();
  }

  select.addEventListener('change', (e) => renderCategory(e.target.value));
  renderCategory(Object.keys(ICON_CATEGORIES)[0]);

  // Tabs
  document.getElementById('symbolTabs').addEventListener('click', (e) => {
    const tab = e.target.closest('.tab');
    if (!tab) return;
    document.querySelectorAll('#symbolTabs .tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const tabName = tab.dataset.tab;
    document.getElementById('iconsPanel').style.display = tabName === 'icons' ? '' : 'none';
    document.getElementById('brandsPanel').style.display = tabName === 'brands' ? '' : 'none';
  });
}

function addSymbolOverlay(iconName) {
  // Get SVG from lucide
  const tempDiv = document.createElement('div');
  tempDiv.innerHTML = `<i data-lucide="${iconName}"></i>`;
  document.body.appendChild(tempDiv);
  lucide.createIcons({ nodes: tempDiv.querySelectorAll('[data-lucide]') });
  const svg = tempDiv.querySelector('svg');
  const svgStr = svg ? svg.outerHTML : '';
  document.body.removeChild(tempDiv);

  if (!svgStr) return;

  const overlay = {
    type: 'symbol',
    data: svgStr,
    x: 35,
    y: 45,
    w: 30,
    h: 30,
    rotation: 0,
    id: Date.now()
  };
  overlays.push(overlay);
  selectedOverlay = overlay.id;
  renderPreview();
  showToast(`Simbolo "${iconName}" agregado`);
}

// ============================================================
// BRANDS
// ============================================================
function initBrands() {
  const grid = document.getElementById('brandGrid');
  Object.entries(BRAND_ICONS).forEach(([name, svg]) => {
    const item = document.createElement('div');
    item.className = 'symbol-item brand';
    item.innerHTML = svg;
    item.title = name;
    item.addEventListener('click', () => addBrandOverlay(name, svg));
    grid.appendChild(item);
  });
}

function addBrandOverlay(name, svgStr) {
  const overlay = {
    type: 'brand',
    data: svgStr,
    x: 35,
    y: 45,
    w: 30,
    h: 30,
    rotation: 0,
    id: Date.now()
  };
  overlays.push(overlay);
  selectedOverlay = overlay.id;
  renderPreview();
  showToast(`Marca "${name}" agregada`);
}

// ============================================================
// IMAGE UPLOAD
// ============================================================
function initUpload() {
  const zone = document.getElementById('uploadZone');
  const input = document.getElementById('fileInput');

  zone.addEventListener('click', () => input.click());
  zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
  zone.addEventListener('drop', (e) => {
    e.preventDefault();
    zone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) handleImageFile(file);
  });

  input.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) handleImageFile(file);
  });

  // Paste
  document.addEventListener('paste', (e) => {
    const items = e.clipboardData?.items;
    if (!items) return;
    for (const item of items) {
      if (item.type.startsWith('image/')) {
        const file = item.getAsFile();
        handleImageFile(file);
        break;
      }
    }
  });
}

function handleImageFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const overlay = {
      type: 'image',
      data: e.target.result,
      x: 25,
      y: 35,
      w: 50,
      h: 50,
      rotation: 0,
      id: Date.now()
    };
    overlays.push(overlay);
    selectedOverlay = overlay.id;
    renderPreview();
    showToast('Imagen agregada');
  };
  reader.readAsDataURL(file);
}

// ============================================================
// PREVIEW RENDERING
// ============================================================
function renderPreview() {
  const container = document.getElementById('previewFolder');
  let html = '';

  // Folder SVG with hue filter
  let folderSvg = FOLDER_SVG.replace('values="0"', `values="${folderHue}"`);
  html += folderSvg;

  // Paper
  if (showPaper) {
    let paper = PAPER_SVG.replace('PAPER_COLOR', paperColor);
    html += `<div style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;">${paper}</div>`;
  }

  // Text overlay (centered on folder face)
  if (textValue) {
    html += `<div class="folder-text-overlay" style="
      position:absolute;
      top:58%;
      left:50%;
      transform:translate(-50%,-50%);
      font-size:${textSize * (container.clientWidth / 512)}px;
      color:${textColorVal};
    ">${escapeHtml(textValue)}</div>`;
  }

  // Overlays
  overlays.forEach(ov => {
    const isSelected = ov.id === selectedOverlay;
    const containerW = container.clientWidth || 512;
    const containerH = container.clientHeight || 512;
    const px = (ov.x / 100) * containerW;
    const py = (ov.y / 100) * containerH;
    const pw = (ov.w / 100) * containerW;
    const ph = (ov.h / 100) * containerH;

    let content = '';
    if (ov.type === 'symbol' || ov.type === 'brand') {
      const fillStyle = ov.type === 'brand' ? 'fill:var(--text);' : 'stroke:var(--text);fill:none;stroke-width:2;';
      content = `<div style="width:100%;height:100%;${fillStyle}">${ov.data.replace(/<svg/, '<svg style="width:100%;height:100%;"')}</div>`;
    } else if (ov.type === 'image') {
      content = `<img src="${ov.data}" style="width:100%;height:100%;object-fit:contain;pointer-events:none;" draggable="false">`;
    }

    html += `
      <div class="overlay-container ${isSelected ? 'selected' : ''}"
           data-id="${ov.id}"
           style="left:${px}px;top:${py}px;width:${pw}px;height:${ph}px;transform:rotate(${ov.rotation}deg);">
        ${content}
        <div class="overlay-controls">
          <div class="overlay-ctrl-btn rotate" data-action="rotate" data-id="${ov.id}">&#8635;</div>
          <div class="overlay-ctrl-btn delete" data-action="delete" data-id="${ov.id}">&times;</div>
        </div>
        <div class="resize-handle" data-id="${ov.id}"></div>
      </div>`;
  });

  container.innerHTML = html;
}

// ============================================================
// PREVIEW INTERACTION (drag, resize, rotate, delete)
// ============================================================
function initPreviewInteraction() {
  const container = document.getElementById('previewFolder');

  container.addEventListener('mousedown', (e) => {
    const overlayEl = e.target.closest('.overlay-container');
    const resizeHandle = e.target.closest('.resize-handle');
    const ctrlBtn = e.target.closest('.overlay-ctrl-btn');

    if (ctrlBtn) {
      const id = parseInt(ctrlBtn.dataset.id);
      const action = ctrlBtn.dataset.action;
      if (action === 'delete') {
        overlays = overlays.filter(o => o.id !== id);
        selectedOverlay = null;
        renderPreview();
      } else if (action === 'rotate') {
        const ov = overlays.find(o => o.id === id);
        if (ov) {
          ov.rotation = (ov.rotation + 15) % 360;
          renderPreview();
        }
      }
      return;
    }

    if (resizeHandle) {
      const id = parseInt(resizeHandle.dataset.id);
      selectedOverlay = id;
      isResizing = true;
      e.preventDefault();
      renderPreview();
      return;
    }

    if (overlayEl) {
      const id = parseInt(overlayEl.dataset.id);
      selectedOverlay = id;
      isDragging = true;
      const rect = container.getBoundingClientRect();
      const ov = overlays.find(o => o.id === id);
      if (ov) {
        dragOffset.x = e.clientX - rect.left - (ov.x / 100) * rect.width;
        dragOffset.y = e.clientY - rect.top - (ov.y / 100) * rect.height;
      }
      e.preventDefault();
      renderPreview();
      return;
    }

    // Click on empty space deselects
    selectedOverlay = null;
    renderPreview();
  });

  document.addEventListener('mousemove', (e) => {
    if (!isDragging && !isResizing) return;
    const container = document.getElementById('previewFolder');
    const rect = container.getBoundingClientRect();
    const ov = overlays.find(o => o.id === selectedOverlay);
    if (!ov) return;

    if (isDragging) {
      ov.x = ((e.clientX - rect.left - dragOffset.x) / rect.width) * 100;
      ov.y = ((e.clientY - rect.top - dragOffset.y) / rect.height) * 100;
      renderPreview();
    }

    if (isResizing) {
      const newW = ((e.clientX - rect.left) / rect.width) * 100 - ov.x;
      const newH = ((e.clientY - rect.top) / rect.height) * 100 - ov.y;
      ov.w = Math.max(5, newW);
      ov.h = Math.max(5, newH);
      renderPreview();
    }
  });

  document.addEventListener('mouseup', () => {
    isDragging = false;
    isResizing = false;
  });
}

// ============================================================
// EXPORT
// ============================================================
function initExport() {
  document.getElementById('copyBtn').addEventListener('click', () => exportAs('clipboard'));
  document.getElementById('downloadBtn').addEventListener('click', () => exportAs('download'));
}

async function exportAs(mode) {
  const canvas = document.createElement('canvas');
  canvas.width = 1024;
  canvas.height = 1024;
  const ctx = canvas.getContext('2d');

  // Draw folder SVG
  let folderSvg = FOLDER_SVG.replace('values="0"', `values="${folderHue}"`);
  await drawSVGOnCanvas(ctx, folderSvg, 0, 0, 1024, 1024);

  // Draw paper
  if (showPaper) {
    let paper = PAPER_SVG.replace('PAPER_COLOR', paperColor);
    await drawSVGOnCanvas(ctx, paper, 0, 0, 1024, 1024);
  }

  // Draw text
  if (textValue) {
    ctx.save();
    ctx.font = `700 ${textSize * 2}px Inter, sans-serif`;
    ctx.fillStyle = textColorVal;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,0.7)';
    ctx.shadowBlur = 6;
    ctx.fillText(textValue, 512, 594);
    ctx.restore();
  }

  // Draw overlays
  for (const ov of overlays) {
    const ox = (ov.x / 100) * 1024;
    const oy = (ov.y / 100) * 1024;
    const ow = (ov.w / 100) * 1024;
    const oh = (ov.h / 100) * 1024;

    ctx.save();
    ctx.translate(ox + ow/2, oy + oh/2);
    ctx.rotate((ov.rotation * Math.PI) / 180);

    if (ov.type === 'image') {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      await new Promise((resolve) => {
        img.onload = resolve;
        img.onerror = resolve;
        img.src = ov.data;
      });
      ctx.drawImage(img, -ow/2, -oh/2, ow, oh);
    } else if (ov.type === 'symbol' || ov.type === 'brand') {
      // Color the SVG white for export
      let svgStr = ov.data;
      if (ov.type === 'brand') {
        svgStr = svgStr.replace(/<svg/, '<svg fill="white" ');
      } else {
        svgStr = svgStr.replace(/<svg/, '<svg stroke="white" fill="none" stroke-width="2" ');
      }
      await drawSVGOnCanvas(ctx, svgStr, -ow/2, -oh/2, ow, oh);
    }

    ctx.restore();
  }

  canvas.toBlob(async (blob) => {
    if (mode === 'clipboard') {
      try {
        await navigator.clipboard.write([new ClipboardItem({'image/png': blob})]);
        showToast('Copiado al portapapeles');
      } catch(e) {
        showToast('Error al copiar: ' + e.message);
      }
    } else {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'carpeta.png';
      a.click();
      URL.revokeObjectURL(url);
      showToast('PNG descargado');
    }
  }, 'image/png');
}

function drawSVGOnCanvas(ctx, svgStr, x, y, w, h) {
  return new Promise((resolve) => {
    const blob = new Blob([svgStr], {type: 'image/svg+xml;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => {
      ctx.drawImage(img, x, y, w, h);
      URL.revokeObjectURL(url);
      resolve();
    };
    img.onerror = () => {
      URL.revokeObjectURL(url);
      resolve();
    };
    img.src = url;
  });
}

// ============================================================
// UTILS
// ============================================================
function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}
